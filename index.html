<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solving Problems</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1>Solving problems using javascript</h1>
    <p class="subtitle">
        making decision in code: if/else and switch statements</p>
        <div class="container">
            <section class="card">
                <span class="tag tag-if">If/Else</span>
                <h2>Grade Calculator </h2>
                <p>Problem:turn a test score into a sentence of string based grade </p>
                <label for="score">(0-100)</label>
                <input type="number" id="score" placeholder="e.g 84">
                <button onclick="checkGrade()">Check Grade</button>
                
                <div class="result" id="gradeResult">Result will show here</div>


            </section> 
            <hr/>
            <section class="card">
                <span class="tag tag-switch">Switch</span>
                <h2>Mini Calculator </h2>
                <p>Problem:do arithmetic ops </p>
                
                <div class="row">
                    
                <label for="num1">First Number</label>
                <input type="number" id="num1" placeholder="e.g 18">
                </div>
                <div>
                <label for="num2">Second Number</label>
                <input type="number" id="num2" placeholder="e.g 50">
                </div>
                

                <label for="operator">Operaton</label>
                <select id="operator">
                    <option value="+">Add(+)</option>
                    <option value="-">Subtract(-)</option>
                    <option value="*">Multiply(*)</option>
                    <option value="/">Divide(/)</option>
                </select>
                <button onclick="calculate()">Calculate</button>
                
                <div class="result" id="calcResult">Result will show here</div>


            </section> 
        </div>
<script src="./script.js"></script>
</body>
</html>
